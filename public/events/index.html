<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Club Critters - Past Events</title>
    
    <link rel="icon" type="image/png" href="../cdn/logos/club/HeadOnly.png">
    <link rel="stylesheet" href="../cdn/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/theme.css">

    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary-blue);
        }
        .event-card {
            background: rgba(21, 30, 41, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .event-card:hover {
            transform: scale(1.02);
            background: rgba(21, 30, 41, 0.8);
        }
        .event-info h3 {
            margin: 0;
            color: #fff;
        }
        .event-date {
            font-size: 0.9rem;
            color: var(--primary-purple);
            margin-top: 4px;
        }
        .event-stats {
            text-align: right;
        }
        .peak-badge {
            background: rgba(0, 230, 118, 0.1);
            color: #00e676;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .duration-text {
            display: block;
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom: 20px;">
            <a href="../" class="btn-cc nav-pill-cc">← Back to Hub</a>
            <a href="../archive/" class="btn-cc nav-pill-cc">📂 Archive</a>
        </div>

        <div class="logo-container">
            <img src="../cdn/logos/club/HeadOnly.png" alt="Logo" class="logo">
        </div>

        <h1>Past Events</h1>
        <p id="status-subtext">By the numbers</p>

        <div id="loading-view">
            <div class="spinner"></div>
            <p>Loading History...</p>
        </div>

        <div id="events-view" class="hidden">
            <div class="stats-grid" id="global-stats">
                <div class="stat-card">
                    <h3>Total Events</h3>
                    <div class="value" id="stat-total-events">-</div>
                </div>
                <div class="stat-card">
                    <h3>All-Time Peak</h3>
                    <div class="value" id="stat-all-time-peak" style="color: #00e676;">-</div>
                </div>
                <div class="stat-card">
                    <h3>Hours Live</h3>
                    <div class="value" id="stat-total-hours" style="color: #B36AF4;">-</div>
                </div>
            </div>

            <div id="event-list">
                <!-- Events injected here -->
            </div>
        </div>
        
        <p id="empty-msg" class="hidden" style="color:#666; text-align: center;">No event history recorded yet.</p>

    </div>

    <script src="../cdn/js/events.js"></script>
</body>
</html>
