<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Club Critters - Community Hub</title>
    
    <link rel="icon" type="image/png" href="cdn/logos/club/HeadOnly.png">
    <link rel="stylesheet" href="cdn/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/events.css">
    <link rel="preconnect" href="https://docs.google.com">
    <link rel="preconnect" href="https://sheets.googleapis.com">

    <meta name="title" content="Club Critters">
    <meta name="description" content="The Club Critters Community Hub. Check event times, DJ lineups, and join us in VRChat!">
    <meta name="theme-color" content="#29C5F6">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://critters.club"> 
    <meta property="og:title" content="Club Critters">
    <meta property="og:description" content="The Club Critters Community Hub. Check event times, DJ lineups, and join us in VRChat!">
    <meta property="og:image" content="https://critters.club/cdn/logos/club/HeadOnly.png">

    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="https://critters.club">
    <meta property="twitter:title" content="Club Critters">
    <meta property="twitter:description" content="The Club Critters Community Hub. Check event times, DJ lineups, and join us in VRChat!">
    <meta property="twitter:image" content="https://critters.club/cdn/logos/club/HeadOnly.png">
</head>
<body class="body-centered">

    <div class="container">
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom: 20px;">
            <a href="archive/" id="archive-link" class="btn-cc nav-pill-cc">📂 Archive</a>
            <a href="events/" id="events-link" class="btn-cc nav-pill-cc">📊 Events</a>
            <a href="/gallery" id="gallery-link" class="btn-cc nav-pill-cc">📸 Gallery</a>
            <a href="team/" class="btn-cc nav-pill-cc">👥 Team</a>
        </div>

        <div class="logo-container">
            <img class="logo" src="cdn/logos/club/HeadOnly.png" alt="Little Critters Logo"> 
        </div>

        <h1 id="main-title">Club Critters</h1>
        <p id="status-subtext">Community Hub</p>
        
        <div id="status-badge-container"></div>

        <div id="loading-view" class="hidden">
            <div class="spinner"></div>
            <p>Loading Schedule...</p>
        </div>

        <div id="offline-view">
            <div id="featured-container"></div>

            <div class="btn-group">
                <a href="https://discord.gg/zcm4feMZmn" class="btn-cc btn-primary">Join our Discord</a>
                <div class="grid-buttons">
                    <a href="https://vrc.group/CLUBLC.9601" class="btn-cc btn-secondary btn-small">VRChat Group</a>
                    <a href="https://vrc.tl/club-critters" class="btn-cc btn-secondary btn-small">VRC.TL Page</a>
                </div>
            </div>
        </div>

        <div id="event-view" class="hidden">
            <div class="event-links-box">
                <p>Event Links</p>
                <a href="https://discord.gg/zcm4feMZmn" class="btn-cc btn-primary btn-small" style="margin-bottom:10px;">Join our Discord</a>
                <div class="grid-buttons">
                    <a href="https://vrc.group/CLUBLC.9601" class="btn-cc btn-secondary btn-small">VRC Group</a>
                    <a href="https://vrc.tl/club-critters" class="btn-cc btn-secondary btn-small">VRC.TL Calendar</a>
                </div>
            </div>

            <div id="dj-container" class="dj-list">
                </div>
        </div>

        </div>

    <script src="cdn/js/theme-engine.js"></script>
    <script src="cdn/js/main.js"></script>

    <!-- SLEEK MOTION TOGGLE -->
    <button id="motion-toggle-btn" 
            onclick="window.toggleMotion()"
            style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; 
                   display: none;
                   background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); 
                   border: 1px solid rgba(255,255,255,0.1); color: #888; 
                   padding: 8px 15px; border-radius: 30px; font-size: 0.7rem; 
                   font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
                   cursor: pointer; transition: all 0.3s ease; opacity: 0.6;"
            onmouseover="this.style.opacity='1'; this.style.borderColor='var(--primary-blue)'; this.style.color='#fff';"
            onmouseout="this.style.opacity='0.6'; this.style.borderColor='rgba(255,255,255,0.1)'; this.style.color='#888';">
        🌑 Disable Effects
    </button>
</body>
</html>
